name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      - run: ruff check .

  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  test-postgres:
    name: Tests (Postgres — true SKIP LOCKED)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: avatar, POSTGRES_PASSWORD: avatar, POSTGRES_DB: avatar }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U avatar"
          --health-interval 3s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev,postgres]"
      - env:
          AVATAR_DATABASE_URL: postgresql+asyncpg://avatar:avatar@localhost:5432/avatar
        run: python -m pytest -q

  demo:
    name: Killer demo (crash-resume → exactly once)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      - run: python -m avatar.cli demo

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t avatar-engine:ci .
